<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultGate Pitch — Frame Review Slideshow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        
        header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .slideshow-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .frame-display {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4);
            max-width: 1400px;
            width: 100%;
        }
        
        .frame-image-container {
            position: relative;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16/9;
            margin-bottom: 20px;
        }
        
        .frame-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }
        
        .frame-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid #333;
        }
        
        .frame-timestamp {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
        }
        
        .frame-description {
            font-size: 18px;
            color: #aaa;
            flex: 1;
            margin-left: 30px;
        }
        
        .frame-counter {
            font-size: 14px;
            color: #666;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
        }
        
        .navigation {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            justify-content: center;
        }
        
        .nav-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .nav-btn:active {
            transform: translateY(0);
        }
        
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        
        .bug-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            margin-left: 15px;
        }
        
        .bug-none {
            background: #059669;
            color: #fff;
        }
        
        .bug-critical {
            background: #dc2626;
            color: #fff;
        }
        
        .bug-warning {
            background: #d97706;
            color: #fff;
        }
        
        .bug-minor {
            background: #2563eb;
            color: #fff;
        }
        
        .thumbnails {
            display: flex;
            gap: 8px;
            padding: 20px 0;
            overflow-x: auto;
            max-width: 1400px;
            margin-top: 20px;
        }
        
        .thumbnail {
            width: 120px;
            height: 68px;
            border-radius: 4px;
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s, transform 0.2s;
            border: 2px solid transparent;
            object-fit: cover;
        }
        
        .thumbnail:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }
        
        .thumbnail.active {
            opacity: 1;
            border-color: #667eea;
        }
        
        .bug-details {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            display: none;
        }
        
        .bug-details.show {
            display: block;
        }
        
        .bug-details h4 {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .bug-item {
            background: #252525;
            border-left: 3px solid #dc2626;
            padding: 10px 15px;
            margin-bottom: 8px;
            border-radius: 0 6px 6px 0;
        }
        
        .bug-item.critical { border-color: #dc2626; }
        .bug-item.warning { border-color: #d97706; }
        .bug-item.minor { border-color: #2563eb; }
        
        .bug-type {
            font-weight: 700;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        
        .bug-desc {
            font-size: 13px;
            color: #ccc;
        }
        
        .keyboard-hint {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }
        
        .keyboard-hint kbd {
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, Consolas, monospace;
            margin: 0 3px;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎬 VaultGate Pitch — Frame Review</h1>
        <p>Interactive slideshow • 24 frames • Manual QA checklist</p>
    </header>
    
    <div class="slideshow-container">
        <div class="frame-display">
            <div class="frame-image-container">
                <img src="frame_000.jpg" alt="Frame 1" class="frame-image" id="currentFrame">
            </div>
            
            <div class="frame-info">
                <div>
                    <div class="frame-timestamp" id="timestamp">0:00:00</div>
                    <div class="frame-description" id="description">Frame 0</div>
                </div>
                <div style="display: flex; align-items: center;">
                    <div class="frame-counter" id="counter">Frame 1 / 24</div>
                    <div class="bug-indicator bug-none" id="bugIndicator">✓ No bugs</div>
                </div>
            </div>
            
            <div class="bug-details" id="bugDetails">
                <h4>Detected Issues</h4>
                <div id="bugList"></div>
            </div>
            
            <div class="navigation">
                <button class="nav-btn" id="prevBtn" onclick="prevFrame()">← Previous</button>
                <button class="nav-btn" id="nextBtn" onclick="nextFrame()">Next →</button>
            </div>
            
            <div class="keyboard-hint">
                <kbd>←</kbd> Previous • <kbd>→</kbd> Next • <kbd>Home</kbd> First • <kbd>End</kbd> Last
            </div>
        </div>
        
        <div class="thumbnails" id="thumbnails"></div>
    </div>
    
    <script>
        const frames = [{"index": 0, "timestamp": "0:00:00", "timestamp_raw": 0, "description": "Frame 0", "filename": "frame_000.jpg", "bugs": []}, {"index": 1, "timestamp": "0:00:03", "timestamp_raw": 3, "description": "Frame 1", "filename": "frame_001.jpg", "bugs": []}, {"index": 2, "timestamp": "0:00:05", "timestamp_raw": 5, "description": "Frame 2", "filename": "frame_002.jpg", "bugs": []}, {"index": 3, "timestamp": "0:00:08", "timestamp_raw": 8, "description": "Frame 3", "filename": "frame_003.jpg", "bugs": []}, {"index": 4, "timestamp": "0:00:10", "timestamp_raw": 10, "description": "Frame 4", "filename": "frame_004.jpg", "bugs": []}, {"index": 5, "timestamp": "0:00:12", "timestamp_raw": 12, "description": "Frame 5", "filename": "frame_005.jpg", "bugs": []}, {"index": 6, "timestamp": "0:00:15", "timestamp_raw": 15, "description": "Frame 6", "filename": "frame_006.jpg", "bugs": []}, {"index": 7, "timestamp": "0:00:18", "timestamp_raw": 18, "description": "Frame 7", "filename": "frame_007.jpg", "bugs": []}, {"index": 8, "timestamp": "0:00:20", "timestamp_raw": 20, "description": "Frame 8", "filename": "frame_008.jpg", "bugs": []}, {"index": 9, "timestamp": "0:00:22", "timestamp_raw": 22, "description": "Frame 9", "filename": "frame_009.jpg", "bugs": []}, {"index": 10, "timestamp": "0:00:26", "timestamp_raw": 26, "description": "Frame 10", "filename": "frame_010.jpg", "bugs": []}, {"index": 11, "timestamp": "0:00:29", "timestamp_raw": 29, "description": "Frame 11", "filename": "frame_011.jpg", "bugs": []}, {"index": 12, "timestamp": "0:00:31", "timestamp_raw": 31, "description": "Frame 12", "filename": "frame_012.jpg", "bugs": []}, {"index": 13, "timestamp": "0:00:33", "timestamp_raw": 33, "description": "Frame 13", "filename": "frame_013.jpg", "bugs": []}, {"index": 14, "timestamp": "0:00:35", "timestamp_raw": 35, "description": "Frame 14", "filename": "frame_014.jpg", "bugs": []}, {"index": 15, "timestamp": "0:00:37", "timestamp_raw": 37, "description": "Frame 15", "filename": "frame_015.jpg", "bugs": []}, {"index": 16, "timestamp": "0:00:39", "timestamp_raw": 39, "description": "Frame 16", "filename": "frame_016.jpg", "bugs": []}, {"index": 17, "timestamp": "0:00:40", "timestamp_raw": 40, "description": "Frame 17", "filename": "frame_017.jpg", "bugs": []}, {"index": 18, "timestamp": "0:00:43", "timestamp_raw": 43, "description": "Frame 18", "filename": "frame_018.jpg", "bugs": []}, {"index": 19, "timestamp": "0:00:45", "timestamp_raw": 45, "description": "Frame 19", "filename": "frame_019.jpg", "bugs": []}, {"index": 20, "timestamp": "0:00:47", "timestamp_raw": 47, "description": "Frame 20", "filename": "frame_020.jpg", "bugs": []}, {"index": 21, "timestamp": "0:00:49", "timestamp_raw": 49, "description": "Frame 21", "filename": "frame_021.jpg", "bugs": []}, {"index": 22, "timestamp": "0:00:51", "timestamp_raw": 51, "description": "Frame 22", "filename": "frame_022.jpg", "bugs": []}, {"index": 23, "timestamp": "0:00:52", "timestamp_raw": 52, "description": "Frame 23", "filename": "frame_023.jpg", "bugs": []}];
        let currentIndex = 0;
        
        function updateDisplay() {
            const frame = frames[currentIndex];
            document.getElementById('currentFrame').src = frame.filename;
            document.getElementById('timestamp').textContent = frame.timestamp;
            document.getElementById('description').textContent = frame.description;
            document.getElementById('counter').textContent = `Frame ${currentIndex + 1} / ${frames.length}`;
            
            // Update bug indicator
            const bugIndicator = document.getElementById('bugIndicator');
            const bugDetails = document.getElementById('bugDetails');
            const bugList = document.getElementById('bugList');
            
            if (frame.bugs && frame.bugs.length > 0) {
                const hasCritical = frame.bugs.some(b => b.severity === 'CRITICAL');
                const hasWarning = frame.bugs.some(b => b.severity === 'WARNING');
                
                if (hasCritical) {
                    bugIndicator.className = 'bug-indicator bug-critical';
                    bugIndicator.textContent = `⚠ ${frame.bugs.length} bug(s)`;
                } else if (hasWarning) {
                    bugIndicator.className = 'bug-indicator bug-warning';
                    bugIndicator.textContent = `⚡ ${frame.bugs.length} issue(s)`;
                } else {
                    bugIndicator.className = 'bug-indicator bug-minor';
                    bugIndicator.textContent = `ℹ️ ${frame.bugs.length} note(s)`;
                }
                
                // Show bug details
                bugDetails.classList.add('show');
                bugList.innerHTML = frame.bugs.map(bug => `
                    <div class="bug-item ${bug.severity.toLowerCase()}">
                        <div class="bug-type">${bug.type} — ${bug.severity}</div>
                        <div class="bug-desc">${bug.description}</div>
                    </div>
                `).join('');
            } else {
                bugIndicator.className = 'bug-indicator bug-none';
                bugIndicator.textContent = '✓ No bugs';
                bugDetails.classList.remove('show');
            }
            
            // Update thumbnails
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === currentIndex);
            });
            
            // Update button states
            document.getElementById('prevBtn').disabled = currentIndex === 0;
            document.getElementById('nextBtn').disabled = currentIndex === frames.length - 1;
        }
        
        function prevFrame() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }
        
        function nextFrame() {
            if (currentIndex < frames.length - 1) {
                currentIndex++;
                updateDisplay();
            }
        }
        
        function goToFrame(index) {
            currentIndex = index;
            updateDisplay();
        }
        
        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') prevFrame();
            if (e.key === 'ArrowRight') nextFrame();
            if (e.key === 'Home') { currentIndex = 0; updateDisplay(); }
            if (e.key === 'End') { currentIndex = frames.length - 1; updateDisplay(); }
        });
        
        // Generate thumbnails
        const thumbnailsContainer = document.getElementById('thumbnails');
        frames.forEach((frame, i) => {
            const thumb = document.createElement('img');
            thumb.src = frame.filename;
            thumb.className = 'thumbnail' + (i === 0 ? ' active' : '');
            thumb.onclick = () => goToFrame(i);
            thumbnailsContainer.appendChild(thumb);
        });
        
        // Initialize
        updateDisplay();
    </script>
</body>
</html>
